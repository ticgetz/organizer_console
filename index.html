<body>
  <!-- Auto-refresh: detect new deploys via version.json polling -->
  <script>
    var META_VERSION = document.querySelector('meta[name="app-version"]')
      ? document.querySelector('meta[name="app-version"]').getAttribute('content')
      : null;

    var LS_KEY = 'ticgetz_organizer_deployed_version';

    function clearCachesAndReload(newVersion) {
      // Save the new version BEFORE reloading so the next load doesn't loop
      try { localStorage.setItem(LS_KEY, newVersion); } catch(e) {}
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
          window.location.reload(true);
        }).catch(function() { window.location.reload(true); });
      } else {
        window.location.reload(true);
      }
    }

    function checkVersion() {
      fetch('/version.json?_t=' + Date.now(), { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.version) return;
          var serverVersion = data.version;

          // Check what version we already accepted (persisted across reloads)
          var acceptedVersion = null;
          try { acceptedVersion = localStorage.getItem(LS_KEY); } catch(e) {}

          // If we already reloaded for this server version, don't loop
          if (acceptedVersion === serverVersion) return;

          // If the baked-in meta version already matches, record it and stop
          if (META_VERSION === serverVersion) {
            try { localStorage.setItem(LS_KEY, serverVersion); } catch(e) {}
            return;
          }

          console.log('New version detected: ' + serverVersion + ' (current: ' + META_VERSION + '). Refreshing...');
          clearCachesAndReload(serverVersion);
        })
        .catch(function() { /* network error — ignore */ });
    }

    // First check 10s after load, then every 60s
    setTimeout(function() {
      checkVersion();
      setInterval(checkVersion, 60000);
    }, 10000);

    // Also check when tab becomes visible again
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') { checkVersion(); }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
